<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Clicker Game</title>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="topbar">

    <button onclick="showMenu('game')">
        🎮 Spiel
    </button>

    <button onclick="showMenu('shop')">
        🛒 Shop
    </button>

    <button onclick="showMenu('leaderboard')">
        🏆 Leaderboard
    </button>

</div>

<div id="gameMenu" class="menu">

    <h1>⚡ CLICKER GAME</h1>

    <div id="coins">0</div>

    <button id="clickButton"></button>

</div>

<div id="shopMenu" class="menu hidden">

    <h1>🛒 SHOP</h1>

    <div class="skins">

        <button
            id="redSkin"
            onclick="buySkin('red', 50, 'redSkin')">

            🔴 Rot - 50
        </button>

        <button
            id="greenSkin"
            onclick="buySkin('green', 100, 'greenSkin')">

            🟢 Grün - 100
        </button>

        <button
            id="goldSkin"
            onclick="buySkin('gold', 250, 'goldSkin')">

            🟡 Gold - 250
        </button>

    </div>

</div>

<div id="leaderboardMenu" class="menu hidden">

    <h1>🏆 Leaderboard</h1>

    <ol>
        <li>Max - 9999</li>
        <li>Lisa - 5000</li>
        <li>Tom - 3200</li>
    </ol>

</div>

<script src="/static/script.js"></script>

</body>
</html>
