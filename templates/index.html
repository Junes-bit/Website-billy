<!DOCTYPE html>
<html>
<head>
<title>RPG GAME</title>
<style>
body { background:#111; color:white; font-family:Arial; text-align:center; }
button { margin:5px; padding:10px; }
#out { margin-top:20px; white-space:pre-wrap; }
</style>
</head>
<body>

<h1>🎮 RPG GAME</h1>

<input id="user" placeholder="User ID">

<br><br>

<button onclick="me()">ME</button>
<button onclick="mine()">MINE</button>
<button onclick="fish()">FISH</button>
<button onclick="daily()">DAILY</button>
<button onclick="lb()">LEADERBOARD</button>

<br><br>

<input id="cmd" placeholder="/mine /fish /daily">
<button onclick="cmd()">SEND</button>

<div id="out"></div>

<script>

function uid(){ return document.getElementById("user").value }

function show(d){ document.getElementById("out").innerText = JSON.stringify(d,null,2) }

async function me(){
 let r = await fetch("/me?user="+uid())
 show(await r.json())
}

async function mine(){
 let r = await fetch("/mine?user="+uid())
 show(await r.json())
}

async function fish(){
 let r = await fetch("/fish?user="+uid())
 show(await r.json())
}

async function daily(){
 let r = await fetch("/daily?user="+uid())
 show(await r.json())
}

async function lb(){
 let r = await fetch("/leaderboard")
 show(await r.json())
}

async function cmd(){
 let text = document.getElementById("cmd").value

 let r = await fetch("/command", {
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({text, user:uid()})
 })

 show(await r.json())
}

</script>

</body>
</html>
