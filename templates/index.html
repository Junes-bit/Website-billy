<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clicker Game</title>

<link rel="stylesheet" href="/static/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

</head>

<body>

<!-- NAME SCREEN -->
<div id="nameScreen">

    <h1>👤 Name</h1>

    <input id="nameInput" placeholder="Dein Name">

    <button onclick="startGame()">
        Start
    </button>

</div>

<!-- TOPBAR -->
<div class="topbar hidden" id="ui">

    <button onclick="show('game')">
        🎮 <span>Spiel</span>
    </button>

    <button onclick="show('shop')">
        🛒 <span>Shop</span>
    </button>

    <button onclick="show('leaderboard')">
        🏆 <span>Ranking</span>
    </button>

</div>

<!-- GAME -->
<div id="game" class="menu hidden">

    <div id="coins">0</div>

    <div id="power">
        ⚡ 1 pro Klick
    </div>

    <button id="click"></button>

</div>

<!-- SHOP -->
<div id="shop" class="menu hidden">

    <h1>🛒 SHOP</h1>

    <h2>🎨 Skins</h2>

    <div class="shopGrid">

        <!-- BLUE -->
        <div class="card selected"
             id="blueSkin"
             onclick="selectSkin('#3b82f6', 'blueSkin')">

            🔵 Blau

        </div>

        <!-- RED -->
        <div class="card"
             id="redSkin"
             onclick="buySkin('redSkin', 50, '#ef4444')">

            🔴 Rot

            <span class="price">
                50 Coins
            </span>

        </div>

        <!-- GREEN -->
        <div class="card"
             id="greenSkin"
             onclick="buySkin('greenSkin', 150, '#22c55e')">

            🟢 Grün

            <span class="price">
                150 Coins
            </span>

        </div>

        <!-- GOLD -->
        <div class="card"
             id="goldSkin"
             onclick="buySkin('goldSkin', 300, 'gold')">

            🟡 Gold

            <span class="price">
                300 Coins
            </span>

        </div>

        <!-- DIAMOND -->
        <div class="card"
             id="diamondSkin"
             onclick="buySkin('diamondSkin', 500, '#38bdf8')">

            💎 Diamant

            <span class="price">
                500 Coins
            </span>

        </div><!-- AVOCADO -->
<div class="card"
     id="avocadoSkin"
     onclick="buySkin('avocadoSkin', 800, '#84cc16')">

    🥑 Avocado

    <span class="price">
        800 Coins
    </span>

</div>
<!-- COOKIE -->
<div class="card"
     id="cookieSkin"
     onclick="buySkin('cookieSkin', 1800, '#92400e')">

    🍪 Cookie

    <span class="price">
        1800 Coins
    </span>

</div>

<!-- PIZZA -->
<div class="card"
     id="pizzaSkin"
     onclick="buySkin('pizzaSkin', 2500, '#f59e0b')">

    🍕 Pizza

    <span class="price">
        2500 Coins
    </span>

</div>

<!-- LEMON -->
<div class="card"
     id="lemonSkin"
     onclick="buySkin('lemonSkin', 3500, '#fde047')">

    🍋 Zitrone

    <span class="price">
        3500 Coins
    </span>

</div>

    </div>

    <!-- UPGRADES -->
    <h2>⬆️ Upgrades</h2>

    <div class="shopGrid">

        <div class="card"
             onclick="buyUpgrade(getUpgradePrice(50),1)">

            +1 Klick

            <span id="u1"></span>

        </div>

        <div class="card"
             onclick="buyUpgrade(getUpgradePrice(150),5)">

            +5 Klick

            <span id="u2"></span>

        </div>

        <div class="card"
             onclick="buyUpgrade(getUpgradePrice(500),10)">

            +10 Klick

            <span id="u3"></span>

        </div>

    </div>

</div>

<!-- LEADERBOARD -->
<div id="leaderboard" class="menu hidden">

    <h1>🏆 Leaderboard</h1>

    <ul id="list"></ul>

</div>

<script src="/static/script.js"></script>

</body>
</html>
