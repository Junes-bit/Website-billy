<!DOCTYPE html>
<html>
<head>
    <title>BillyBot Web</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>🎮 BillyBot Web</h1>

    <input id="user" placeholder="User ID">

    <div class="buttons">
        <button onclick="me()">👤 ME</button>
        <button onclick="inventory()">🎒 INVENTORY</button>
    </div>

    <p id="output"></p>
</div>

<script>
async function me() {
    let user = document.getElementById("user").value;
    let res = await fetch("/me?user=" + user);
    document.getElementById("output").innerText = await res.text();
}

async function inventory() {
    let user = document.getElementById("user").value;
    let res = await fetch("/me?user=" + user);
    let data = await res.json();

    document.getElementById("output").innerText =
        JSON.stringify(data.inventory, null, 2);
}
</script>

</body>
</html>
