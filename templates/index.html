<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
user-scalable=no">

<title>Clicker Game</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<!-- NAME SCREEN -->
<div id="nameScreen">

    <h1>👤 Dein Name</h1>

    <input id="nameInput"
    placeholder="Name eingeben">

    <button onclick="startGame()">
        Start
    </button>

</div>

<!-- TOPBAR -->
<div class="topbar hidden"
id="gameUI">

    <button onclick="showMenu('game')">🎮</button>
    <button onclick="showMenu('shop')">🛒</button>
    <button onclick="showMenu('leaderboard')">🏆</button>

</div>

<!-- GAME -->
<div id="gameMenu" class="menu hidden">

    <div id="coins">0</div>

    <button id="clickButton"></button>

</div>

<!-- SHOP -->
<div id="shopMenu" class="menu hidden">

    <h1>Shop</h1>

    <button onclick="buyUpgrade(50,1)">+1 Klick (50)</button>
    <button onclick="buyUpgrade(150,5)">+5 Klick (150)</button>

</div>

<!-- LEADERBOARD -->
<div id="leaderboardMenu" class="menu hidden">

    <h1>🏆 Leaderboard</h1>

    <ul id="leaderboardList"></ul>

</div>

<script src="/static/script.js"></script>

</body>
</html>
