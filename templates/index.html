<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Clicker Game</title>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>🔥 Clicker Game</h1>

    <div id="score">0</div>

    <button id="clickButton">
        CLICK
    </button>

    <div class="shop">
        <h2>Shop</h2>

        <button onclick="buyColor('red', 50)">
            Rot kaufen (50)
        </button>

        <button onclick="buyColor('blue', 100)">
            Blau kaufen (100)
        </button>

        <button onclick="buyColor('gold', 250)">
            Gold kaufen (250)
        </button>
    </div>

    <div class="leaderboard">
        <h2>Leaderboard</h2>

        <ul id="leaderboardList"></ul>
    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
