<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clicker Game</title>

<link rel="stylesheet" href="/static/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>

<div id="nameScreen">
    <h1>👤 Name</h1>
    <input id="nameInput" placeholder="Dein Name">
    <button onclick="startGame()">Start</button>
</div>

<div class="topbar hidden" id="ui">
    <button onclick="show('game')">🎮 Spiel</button>
    <button onclick="show('shop')">🛒 Shop</button>
    <button onclick="show('leaderboard')">🏆 Ranking</button>
    <button onclick="toggleCodeBox()">🎁 Code</button>
</div>

<div id="codePopup" class="popup hidden">
    <div class="popupBox">
        <h2>Code</h2>
        <input id="codeInput" placeholder="Code">
        <button onclick="redeemCode()">Einlösen</button>
        <button onclick="toggleCodeBox()">Schließen</button>
    </div>
</div>

<div id="game" class="menu hidden">
    <div id="coins">0</div>
    <div id="power">⚡ 1</div>
    <button id="click"></button>
</div>

<div id="shop" class="menu hidden">
    <h1>Shop</h1>

    <div class="shopGrid">
        <div class="card selected" id="blueSkin" onclick="selectSkin('#3b82f6','blueSkin')">Blau</div>
        <div class="card" id="redSkin" onclick="buySkin('redSkin',100,'#ef4444')">Rot <span class="price">100</span></div>
        <div class="card" id="greenSkin" onclick="buySkin('greenSkin',250,'#22c55e')">Grün <span class="price">250</span></div>
    </div>

    <h2>Upgrades</h2>

    <div class="shopGrid">
        <div class="card" onclick="buyUpgrade(getUpgradePrice(50),1)">+1 <span id="u1"></span></div>
        <div class="card" onclick="buyUpgrade(getUpgradePrice(150),5)">+5 <span id="u2"></span></div>
    </div>
</div>

<div id="leaderboard" class="menu hidden">
    <h1>Leaderboard</h1>
    <ul id="list"></ul>
</div>

<script src="/static/script.js"></script>
</body>
</html>
